services:
  - type: web
    name: healthprice-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MODEL_DIR
        value: models
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CF_SECRET_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.7"
